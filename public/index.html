<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Naswan Engine V5</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card { background: #1e293b; padding: 10px; border-radius: 8px; border: 1px solid #334155; }
        .btn { padding: 8px; border: none; border-radius: 4px; cursor: pointer; background: #4f46e5; color: white; }
        .btn-danger { background: #ef4444; }
    </style>
</head>
<body>
    <div id="lobby">
        <input id="name" placeholder="Nama Lu">
        <input id="room" placeholder="Kode Room">
        <button class="btn" onclick="join()">JOIN</button>
    </div>

    <div id="game" style="display:none">
        <div id="players" class="grid"></div>
        <button class="btn" onclick="initVoice()">AKTIFKAN VOICE</button>
    </div>

    <script>
        const socket = io();
        let peer = new Peer();
        let currentRoom;

        function join() {
            currentRoom = document.getElementById('room').value;
            socket.emit('join', { room: currentRoom, name: document.getElementById('name').value });
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'block';
        }

        socket.on('update', (data) => {
            document.getElementById('players').innerHTML = data.players.map(p => `
                <div class="card">
                    ${p.name} <br>
                    <button class="btn btn-danger" onclick="socket.emit('kick', {room: '${currentRoom}', targetId: '${p.id}'})">KICK</button>
                </div>
            `).join('');
        });

        socket.on('kicked', () => { alert('Lu dikick!'); location.reload(); });

        async function initVoice() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peer.on('call', call => call.answer(stream));
        }
    </script>
</body>
</html>
