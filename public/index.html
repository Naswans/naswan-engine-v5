<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Impostor Ultimate</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff4d4d; --cyan: #00f2ff; --bg: #030712; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            background: radial-gradient(circle at top, #111827, #030712); 
            color: white; font-family: 'Poppins', sans-serif; 
            display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; 
        }
        .app { width: 100%; max-width: 480px; position: relative; }
        
        /* Glass Design */
        .glass-panel { 
            background: var(--glass); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; 
            padding: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
        }

        .timer { 
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem; color: var(--cyan); 
            text-align: center; text-shadow: 0 0 20px var(--cyan); margin-bottom: 20px; 
        }

        .role-badge { 
            display: inline-block; padding: 5px 15px; border-radius: 50px; 
            font-size: 0.8rem; font-weight: bold; margin-bottom: 10px;
        }

        .scroll { 
            height: 150px; overflow-y: auto; background: rgba(0,0,0,0.3); 
            border-radius: 15px; padding: 12px; font-size: 0.9rem; margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input { 
            width: 100%; padding: 15px; background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 15px; 
            margin: 10px 0; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); background: rgba(255,255,255,0.12); }

        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 15px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--cyan), #0066ff); color: #000; }
        .btn-danger { background: linear-gradient(135deg, var(--red), #990000); color: white; }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }

        .player-tag {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: var(--glass); border-radius: 12px; margin: 5px 0;
            border: 1px solid transparent; transition: 0.2s;
        }
        .player-tag.active { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .host-label { font-size: 0.6rem; background: gold; color: black; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        
        #lobby-ui { text-align: center; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="app">
        <div id="login-ui" class="glass-panel">
            <h1 style="font-family:'Orbitron'; text-align:center; color:var(--cyan);">WORD<br>IMPOSTOR</h1>
            <p style="text-align:center; opacity:0.6; font-size:0.8rem;">ENGINE V2.0 MULTIPLAYER</p>
            <input type="text" id="uname" placeholder="Enter Codename..." maxlength="12">
            <button class="btn btn-primary" onclick="join()">INITIALIZE</button>
        </div>

        <div id="game-ui" style="display:none;" class="glass-panel">
            <div id="time-display" class="timer">30</div>
            
            <div id="lobby-zone">
                <h3 style="text-align:center;">Lobby Permainan</h3>
                <div id="lobby-list" style="margin-bottom:20px;"></div>
                <div id="host-controls" style="display:none;">
                    <button class="btn btn-primary pulse" onclick="socket.emit('start_game_request')">START MISSION</button>
                    <p style="font-size:0.7rem; margin-top:10px; opacity:0.5;">Hanya Anda (Host) yang bisa memulai.</p>
                </div>
                <div id="wait-msg" style="text-align:center; opacity:0.6;">Menunggu Host memulai...</div>
            </div>

            <div id="action-zone" style="display:none;">
                <div id="role-box" class="card" style="padding:15px; border-radius:15px; margin-bottom:15px; background:rgba(0,0,0,0.2);"></div>
                
                <div id="playing-zone">
                    <div class="scroll" id="history-box"></div>
                    <p id="turn-msg" style="text-align:center; font-weight:bold;"></p>
                    <input type="text" id="desc-input" placeholder="Tulis deskripsi objek...">
                    <button id="send-btn" class="btn btn-primary" onclick="sendDescription()">KIRIM DATA</button>
                </div>

                <div id="voting-zone" style="display:none;">
                    <h3 style="color:var(--red); text-align:center; font-family:'Orbitron';">VOTING PROTOCOL</h3>
                    <div id="vote-list"></div>
                </div>
            </div>

            <div id="chat-zone" style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
                <div class="scroll" id="chat-box" style="height: 80px; font-size:0.8rem;"></div>
                <input type="text" id="msg-input" placeholder="Pesan strategi..." onkeypress="if(event.key==='Enter')sendChat()">
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myId = "";

        function join() {
            const name = document.getElementById('uname').value.trim();
            if(name) {
                socket.emit('join_game', name);
                myId = socket.id;
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
            }
        }

        function sendDescription() {
            const val = document.getElementById('desc-input').value;
            if(val) {
                socket.emit('send_description', val);
                document.getElementById('desc-input').value = "";
            }
        }

        function sendChat() {
            const val = document.getElementById('msg-input').value;
            if(val) {
                socket.emit('free_chat', val);
                document.getElementById('msg-input').value = "";
            }
        }

        socket.on('role_reveal', (d) => {
            document.getElementById('lobby-zone').style.display = 'none';
            document.getElementById('action-zone').style.display = 'block';
            
            const color = d.role === 'IMPOSTOR' ? 'var(--red)' : 'var(--cyan)';
            let partnerInfo = "";
            if(d.impostorPartners.length > 1) {
                partnerInfo = `<div style="font-size:0.7rem; margin-top:5px;">Rekan: ${d.impostorPartners.filter(n => n !== document.getElementById('uname').value).join(', ')}</div>`;
            }

            document.getElementById('role-box').innerHTML = `
                <span class="role-badge" style="background:${color}; color:${d.role === 'IMPOSTOR' ? 'white' : 'black'}">${d.role}</span>
                <div style="font-size:1.3rem; font-weight:bold;">${d.word}</div>
                ${partnerInfo}
            `;
        });

        socket.on('game_state_update', (s) => {
            // Update Lobby
            if(s.status === 'LOBBY') {
                document.getElementById('lobby-zone').style.display = 'block';
                document.getElementById('action-zone').style.display = 'none';
                document.getElementById('lobby-list').innerHTML = s.alivePlayers.map(p => `
                    <div class="player-tag">
                        <span>👤 ${p.username} ${p.isHost ? '<span class="host-label">HOST</span>' : ''}</span>
                        <span style="font-size:0.7rem; opacity:0.5;">READY</span>
                    </div>
                `).join('');
                
                const isHost = s.hostId === myId;
                document.getElementById('host-controls').style.display = isHost ? 'block' : 'none';
                document.getElementById('wait-msg').style.display = isHost ? 'none' : 'block';
                return;
            }

            // Update Game
            const hb = document.getElementById('history-box');
            hb.innerHTML = s.clueHistory.map(c => `<div><b style="color:var(--cyan)">${c.user}:</b> ${c.text}</div>`).join('');
            hb.scrollTop = hb.scrollHeight;

            const isMyTurn = s.turnPlayer === myId;
            document.getElementById('send-btn').disabled = !isMyTurn;
            document.getElementById('turn-msg').innerText = isMyTurn ? "🔴 GILIRAN ANDA!" : "⏳ MENUNGGU TRANSMISI...";
            document.getElementById('turn-msg').style.color = isMyTurn ? "var(--red)" : "white";

            if(s.status === 'VOTING') {
                document.getElementById('playing-zone').style.display = 'none';
                document.getElementById('voting-zone').style.display = 'block';
                document.getElementById('vote-list').innerHTML = s.alivePlayers
                    .map(p => `
                        <div class="player-tag ${p.id === myId ? '' : 'active'}" 
                             ${p.id === myId ? '' : `onclick="socket.emit('cast_vote', '${p.id}')"`}>
                            <span>${p.username} ${p.id === myId ? '(Anda)' : ''}</span>
                            <span class="vote-count" style="background:var(--red); padding:2px 10px; border-radius:10px; font-size:0.7rem;">${p.voteCount}</span>
                        </div>
                    `).join('');
            } else {
                document.getElementById('playing-zone').style.display = 'block';
                document.getElementById('voting-zone').style.display = 'none';
            }
        });

        socket.on('timer_sync', (t) => {
            const el = document.getElementById('time-display');
            el.innerText = t;
            el.style.color = t <= 5 ? 'var(--red)' : 'var(--cyan)';
        });

        socket.on('receive_chat', (d) => {
            const cb = document.getElementById('chat-box');
            cb.innerHTML += `<div style="margin-bottom:4px;"><b style="color:var(--cyan)">${d.user}:</b> ${d.msg}</div>`;
            cb.scrollTop = cb.scrollHeight;
        });

        socket.on('game_over', (msg) => {
            alert(msg);
            location.reload();
        });
    </script>
</body>
</html>
